<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Admin | Gestão de Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <img src="sua-logo.png" alt="Logo" class="logo">
            </div>
            <ul class="list-unstyled components">
                <li class="active"><a href="#"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="#"><i class="fas fa-users"></i> Clientes (Igrejas/Lojas)</a></li>
                <li><a href="#"><i class="fas fa-chart-line"></i> Métricas Gerais</a></li>
                <li><a href="#"><i class="fas fa-cogs"></i> Configurações do Sistema</a></li>
            </ul>
        </nav>

        <div id="content">
            <header class="topbar">
                <button type="button" id="sidebarCollapse" class="btn">
                    <i class="fas fa-align-left"></i>
                </button>
                <div class="user-profile">
                    <span>Fernando (Admin)</span>
                    <img src="avatar.png" class="avatar">
                </div>
            </header>

            <div class="main-body">
                <h2>Gestão de Novos Clientes</h2>
                <div class="card">
                    <button class="btn-primary" onclick="abrirModalNovoCliente()">+ Novo Cliente</button>
                    <table id="tabelaClientes">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>ID Único</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaClientes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modalCliente" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Cadastrar Novo Cliente</h3>
                <button class="close-btn" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formNovoCliente">
                    <div class="form-group">
                        <label>Nome da Organização</label>
                        <input type="text" id="nomeOrg" placeholder="Ex: Igreja Central" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail do Administrador</label>
                        <input type="email" id="emailAdmin" placeholder="admin@cliente.com" required>
                    </div>
                    <div class="form-group">
                        <label>Subdomínio/Slug</label>
                        <input type="text" id="slugCliente" placeholder="igreja-central" required>
                        <small style="color: #64748b; font-size: 11px;">Identificador único para URL e App.</small>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                        <button type="submit" class="btn-save">Criar Acesso</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
<script type="module" src="app.js"></script>
</body>
</html>
